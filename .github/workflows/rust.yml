name: Rust

on:
  push:
    tags:
      - 'v*'
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Imposta Rust con toolchain GNU
      run: |
        rustup update stable
        rustup default stable
        rustup set default-host x86_64-pc-windows-gnu
        rustup target add x86_64-pc-windows-gnu

    - name: Installa MSYS2 (MinGW64)
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: |
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-make
          mingw-w64-x86_64-pkg-config
          git
          base-devel

    - name: Aggiungi MinGW al PATH
      run: |
        echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Configura variabili d'ambiente per GCC
      run: |
        echo "CC=gcc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "CXX=g++" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "AR=gcc-ar" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=gcc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_AR=gcc-ar" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Verifica strumenti
      run: |
        gcc --version
        g++ --version
        cmake --version
        ninja --version

    - name: Compila con target GNU
      run: cargo build --release --target x86_64-pc-windows-gnu -v
      env:
        PKG_CONFIG_ALLOW_CROSS: "1"
        CFLTK_USE_OPENGL: "OFF"
        CFLTK_MSVC_CRT_STATIC: "OFF"

    - name: Elenca file compilati
      run: |
        echo "File in target/x86_64-pc-windows-gnu/release/:"
        dir target\x86_64-pc-windows-gnu\release\*.exe

    - name: Carica l'eseguibile
      uses: actions/upload-artifact@v4
      with:
        name: rpgmdec-windows-gnu
        path: target/x86_64-pc-windows-gnu/release/*.exe