name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    # Cambiamo il sistema operativo del runner
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: x86_64-pc-windows-msvc

    - name: Build
      # Usiamo --release per avere un .exe ottimizzato e pronto all'uso
      run: cargo build --release --verbose

    - name: Upload Windows Binary
      uses: actions/upload-artifact@v4
      with:
        name: programma-windows
        # Nota l'estensione .exe e la cartella 'release'
        path: target/release/rpgmdec.exe